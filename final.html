<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fake Store Project</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        font-family: Arial, sans-serif;
        background: #f5f5f5;
      }

      .controls {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        justify-content: center;
        padding: 20px;
      }

      .controls input,
      .controls button,
      .controls select {
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 8px;
        font-size: 15px;
        cursor: pointer;
      }

      #products {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 20px;
        padding: 20px;
      }

      .card {
        background: white;
        border-radius: 12px;
        padding: 15px;
        text-align: center;
        transition: 0.3s;
      }

      .card:hover {
        transform: scale(1.03);
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
      }

      .card img {
        height: 180px;
        width: 100%;
        object-fit: contain;
      }

      .card h3 {
        font-size: 16px;
        margin-bottom: 10px;
      }

      .card p {
        color: gray;
        font-size: 14px;
        margin-bottom: 10px;
      }

      .card button {
        margin: 5px;
        padding: 8px 12px;
        border: none;
        border-radius: 8px;
        background: black;
        color: white;
        cursor: pointer;
      }

      .modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.5);
        justify-content: center;
        align-items: center;
      }

      .modal-content {
        background: white;
        width: 400px;
        padding: 20px;
        border-radius: 12px;
        text-align: center;
        position: relative;
      }

      .modal-content img {
        height: 200px;
        object-fit: contain;
        margin-bottom: 10px;
      }

      .close {
        position: absolute;
        top: 10px;
        right: 15px;
        font-size: 28px;
        color: red;
        cursor: pointer;
      }
    </style>
  </head>

  <body>
    <div class="controls">
      <label for="search" style="display:none;">Search Products</label>
      <input type="text" id="search" placeholder="Search Products..."/>
      
      <button type="button" onclick="sortLow()">Low → High</button>
      <button type="button" onclick="sortHigh()">High → Low</button>

      <select id="category">
        <option value="all">All Categories</option>
        <option value="electronics">electronics</option>
        <option value="jewelery">jewelery</option>
        <option value="men's clothing">men's clothing</option>
        <option value="women's clothing">women's clothing</option>
      </select>
    </div>

    <div id="products"></div>

    <div class="modal" id="modal" role="dialog">
      <div class="modal-content">
        <span class="close" onclick="closeModal()">&times;</span>
        <div id="modalData"></div>
      </div>
    </div>
    <script src="./task8.js"></script>
  </body>
</html>
